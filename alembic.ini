# Alembic configuration for the MCP-1C Postgres backend (skeleton).
#
# The DSN is **not** baked into this file. ``migrations/env.py`` reads
# it from the ``MCP_PG_DSN`` environment variable at runtime so
# operators can target dev / staging / prod without editing the repo.
#
# The vector dimension is read from ``MCP_PG_EMBEDDING_DIM`` (default
# 4096, matching DeepInfra ``Qwen/Qwen3-Embedding-8B``). Different
# embedding models need different dimensions — keep them aligned.

[alembic]
script_location = migrations

# Empty here on purpose: env.py overrides this from MCP_PG_DSN.
sqlalchemy.url =

# Use the file revision id rather than a date — easier to grep for in
# logs, and we don't squash often.
file_template = %%(rev)s_%%(slug)s

# Allow ``alembic init``-style timezone-aware filenames if we ever add
# them; default is local time which is fine for now.
timezone =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
